services:
  blitz-unit-test:
    hostname: blitz-unit-test
    build:
      context: .
      dockerfile: docker/Dockerfile.unit.test
    privileged: true
    cgroup: host
    command: ["/sbin/init"]
  blitz-dev-test:
    hostname: blitz-dev-test
    build:
      context: .
      dockerfile: docker/Dockerfile.dev.test
    privileged: true
    cgroup: host
    command: ["/sbin/init"]
  blitz-clean:
    hostname: blitz-clean
    build:
      context: .
      dockerfile: docker/Dockerfile.clean
    privileged: true
    cgroup: host
    command: ["/sbin/init"]
